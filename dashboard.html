<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Capta — painel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A1F; --surface:#0D1430; --surface2:#141C42; --surface3:#1a2250;
  --tx:#EAF0FF; --dm:rgba(234,240,255,.65); --dr:rgba(234,240,255,.36);
  --or:#2E5BFF; --or-deep:#1E3FD0; --or-soft:rgba(46,91,255,.18);
  --line:rgba(234,240,255,.12); --line2:rgba(234,240,255,.07);
  --quente:#FF6B6B; --quente-bg:rgba(255,107,107,.15);
  --morno:#E0930F; --morno-bg:rgba(224,147,15,.15);
  --frio:#5B8DEF; --frio-bg:rgba(91,141,239,.15);
  --verde:#3BC97A;
  --r:14px;
  --raio:0 1px 2px rgba(0,0,0,.1), 0 8px 24px -12px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;line-height:1.45}
.app{max-width:560px;margin:0 auto;min-height:100dvh;padding-bottom:24px}

/* top nav */
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;position:sticky;top:0;background:rgba(6,10,31,.92);backdrop-filter:blur(16px);z-index:20;border-bottom:1px solid var(--line)}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;font-size:19px;color:var(--tx)}
.logo img{width:30px;height:30px;border-radius:8px}
.logo b{color:var(--or)}
.who{text-align:right;line-height:1.15}
.who strong{font-size:13px;font-weight:700;display:block;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who .plan{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--or)}

.demo-tag{background:rgba(46,91,255,.18);color:#7FB0FF;font-size:11px;font-weight:700;text-align:center;padding:7px;margin:0 14px 6px;border-radius:10px;border:1px solid rgba(46,91,255,.3)}

/* tabs */
.tabs{display:flex;gap:4px;padding:2px 14px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1.5px solid var(--line);background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--dr);padding:8px 16px;border-radius:99px;cursor:pointer;white-space:nowrap;transition:.15s}
.tab.on{background:var(--or);color:#fff;border-color:var(--or);box-shadow:0 0 18px var(--or-soft)}

main{padding:0 14px}
.reveal{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* stats grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--raio)}
.stat .lbl{font-size:12px;color:var(--dm);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:4px;font-variant-numeric:tabular-nums}
.stat .sub{font-size:11.5px;color:var(--dr);font-weight:600;margin-top:2px}
.pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
.pill.q{background:var(--quente-bg);color:var(--quente)}
.pill.m{background:var(--morno-bg);color:var(--morno)}
.pill.f{background:var(--frio-bg);color:var(--frio)}

/* sec */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}
.sec-h h2{font-size:15px;font-weight:800;letter-spacing:-.01em}

/* lead card */
.lead{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;box-shadow:var(--raio);cursor:pointer;transition:.1s}
.lead:hover{border-color:rgba(46,91,255,.4);background:var(--surface2)}
.av{flex:0 0 40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff}
.lead .mid{flex:1;min-width:0}
.lead .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead .meta{font-size:12px;color:var(--dr);display:flex;gap:7px;align-items:center;margin-top:2px;flex-wrap:wrap}
.lead .right{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.temp{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:99px}
.temp.q{background:var(--quente-bg);color:var(--quente)}
.temp.m{background:var(--morno-bg);color:var(--morno)}
.temp.f{background:var(--frio-bg);color:var(--frio)}
.score{font-size:12px;font-weight:800;color:var(--dr);font-variant-numeric:tabular-nums}
.stbadge{font-size:10px;font-weight:700;color:var(--dr)}

/* chips filtro */
.chips{display:flex;gap:7px;margin:2px 2px 12px;flex-wrap:wrap}
.chip{border:1.5px solid var(--line);background:transparent;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--dr);padding:7px 13px;border-radius:99px;cursor:pointer;transition:.12s}
.chip.on{background:var(--or);color:#fff;border-color:var(--or)}
.empty{text-align:center;color:var(--dr);font-size:14px;padding:40px 10px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:22px 22px 0 0;z-index:50;transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.8,.3,1);max-height:88dvh;overflow-y:auto;padding:8px 18px 26px}
.drawer.on{transform:none}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 14px}
.d-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.d-head .av{flex:0 0 48px;height:48px;border-radius:13px;font-size:18px}
.d-head h3{font-size:18px;font-weight:800;color:var(--tx)}
.d-head .meta{font-size:13px;color:var(--dm)}
.scorebar{background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:14px}
.scorebar .topl{display:flex;justify-content:space-between;align-items:center}
.scorebar b{font-size:13px;color:var(--dm)}
.scorebar .big{font-size:20px;font-weight:800}
.qa .row{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:8px 0;border-bottom:1px solid var(--line2);color:var(--dm)}
.qa .row:last-child{border:0}
.qa .a{font-weight:700;color:var(--tx)}
.zap{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--verde);color:#fff;border:0;font-family:inherit;font-weight:700;font-size:15px;padding:14px;border-radius:13px;cursor:pointer;text-decoration:none;margin-top:14px}
.stbtns{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.stbtns button{flex:1;min-width:0;border:1.5px solid var(--line);background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:var(--dr);padding:9px 6px;border-radius:10px;cursor:pointer;transition:.12s;white-space:nowrap}
.stbtns button.on{background:var(--or);color:#fff;border-color:var(--or)}

/* plano */
.plancard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--raio);margin-bottom:10px}
.plancard .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line2);font-size:14px;color:var(--dm)}
.plancard .row:last-child{border:0}
.plancard .row .v{font-weight:700;color:var(--tx)}
.feat{display:flex;gap:9px;font-size:13.5px;margin:8px 0;color:var(--dm)}
.feat::before{content:"✓";flex:0 0 18px;height:18px;border-radius:50%;background:var(--or-soft);color:var(--or);font-weight:800;font-size:11px;display:grid;place-items:center}

/* link box */
.link-box{display:flex;gap:8px;margin:10px 0}
.link-box input{flex:1;font-family:inherit;font-size:13px;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface2);color:var(--tx)}
.link-box button{border:0;background:var(--or);color:#fff;font-family:inherit;font-weight:700;padding:0 16px;border-radius:10px;cursor:pointer}
.note{font-size:12.5px;color:var(--dr);text-align:center;margin-top:12px;line-height:1.5}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo"><img id="logo-img" alt="Capta">capta<b>.</b></div>
    <div class="who"><strong id="who-nome">—</strong><span class="plan" id="who-plan">—</span></div>
  </div>
  <div class="demo-tag" id="demo-tag" style="display:none">Modo demonstração · dados de exemplo</div>
  <div class="tabs">
    <button class="tab on" data-t="painel">Painel</button>
    <button class="tab" data-t="leads">Leads</button>
    <button class="tab" data-t="form">Seu link</button>
    <button class="tab" data-t="plano">Plano</button>
  </div>
  <main id="view"></main>
</div>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"><div class="grab"></div><div id="drawer-body"></div></div>

<script>
const params   = new URLSearchParams(location.search);
const SLUG     = params.get('t');
const TOKEN    = params.get('k');
const LEADS_API = '/api/capta-leads';
const COLORS   = ['#2E5BFF','#3BC97A','#E0930F','#9B5BFF','#FF6B6B','#5B8DEF'];
const ini      = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const color    = n => COLORS[(n||'A').charCodeAt(0) % COLORS.length];
const tcss     = t => t==='Quente'?'q':t==='Morno'?'m':'f';

let DATA = { tenant:{nome:'—',plano:'pro'}, leads:[] };
let DEMO = false, filter = 'all';

const view  = document.getElementById('view');
const scrim = document.getElementById('scrim');
const drawer = document.getElementById('drawer');
const dbody  = document.getElementById('drawer-body');

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on'); render(t.dataset.t);
});
scrim.onclick = () => { scrim.classList.remove('on'); drawer.classList.remove('on'); };

load();

async function load(){
  if(SLUG && TOKEN){
    try{
      const r = await fetch(`${LEADS_API}?t=${encodeURIComponent(SLUG)}&k=${encodeURIComponent(TOKEN)}`);
      if(r.ok){ DATA = await r.json(); }
      else throw new Error('api '+r.status);
    } catch(e){ console.warn('caindo p/ demo:', e.message); DEMO=true; DATA=demoData(); }
  } else { DEMO=true; DATA=demoData(); }
  document.getElementById('who-nome').textContent = DATA.tenant.nome;
  document.getElementById('who-plan').textContent = 'Plano '+(DATA.tenant.plano||'pro');
  document.getElementById('demo-tag').style.display = DEMO ? 'block' : 'none';
  render('painel');
}

function counts(){
  const now=new Date(), mes=now.getMonth(), ano=now.getFullYear();
  const isHoje = d => d.toDateString()===now.toDateString();
  let q=0,m=0,f=0,mesC=0,hoje=0;
  DATA.leads.forEach(l => {
    if(l.temperatura==='Quente') q++; else if(l.temperatura==='Morno') m++; else f++;
    const d = new Date(l.criado_em);
    if(d.getMonth()===mes && d.getFullYear()===ano) mesC++;
    if(isHoje(d)) hoje++;
  });
  return {q,m,f,mes:mesC,hoje,total:DATA.leads.length};
}

function render(tab){ ({painel:renderPainel,leads:renderLeads,form:renderForm,plano:renderPlano}[tab])(); }

function renderPainel(){
  const c = counts();
  view.innerHTML = `<div class="reveal">
    <div class="grid2">
      <div class="stat"><div class="lbl">Leads no mês</div><div class="num">${c.mes}</div><div class="sub">${c.total} no total</div></div>
      <div class="stat"><div class="lbl">Hoje</div><div class="num">${c.hoje}</div><div class="sub">novos contatos</div></div>
      <div class="stat"><div class="lbl"><span class="pill q">Quente</span></div><div class="num">${c.q}</div><div class="sub">prontos pra fechar</div></div>
      <div class="stat"><div class="lbl"><span class="pill m">Morno</span></div><div class="num">${c.m}</div><div class="sub">vale follow-up</div></div>
    </div>
    <div class="sec-h"><h2>Últimos leads</h2></div>
    <div id="feed">${DATA.leads.length ? DATA.leads.slice(0,6).map((l,i)=>leadCard(l,i)).join('') : emptyState()}</div>
  </div>`;
  bindLeads();
}

function renderLeads(){
  const c = counts();
  const f = DATA.leads.filter(l => filter==='all' || tcss(l.temperatura)===filter);
  view.innerHTML = `<div class="reveal">
    <div class="chips">
      <button class="chip ${filter==='all'?'on':''}" data-f="all">Todos ${c.total}</button>
      <button class="chip ${filter==='q'?'on':''}" data-f="q">Quentes ${c.q}</button>
      <button class="chip ${filter==='m'?'on':''}" data-f="m">Mornos ${c.m}</button>
      <button class="chip ${filter==='f'?'on':''}" data-f="f">Frios ${c.f}</button>
    </div>
    <div id="feed">${f.length ? f.map(l=>leadCard(l,DATA.leads.indexOf(l))).join('') : emptyState()}</div>
  </div>`;
  document.querySelectorAll('.chip').forEach(ch => ch.onclick = () => { filter=ch.dataset.f; renderLeads(); });
  bindLeads();
}

function leadCard(l, i){
  return `<div class="lead" data-i="${i}">
    <div class="av" style="background:${color(l.nome)}">${ini(l.nome)}</div>
    <div class="mid">
      <div class="nm">${esc(l.nome)}</div>
      <div class="meta">${l.origem?'<span>'+esc(l.origem)+'</span>·':''}<span>${timeAgo(l.criado_em)}</span>${l.status&&l.status!=='novo'?'·<span class="stbadge">'+esc(l.status)+'</span>':''}</div>
    </div>
    <div class="right">
      <span class="temp ${tcss(l.temperatura)}">${esc(l.temperatura||'—')}</span>
      <span class="score">${l.score??'–'}/100</span>
    </div>
  </div>`;
}

function emptyState(){ return `<div class="empty">Nenhum lead ainda.<br>Divulgue seu link e eles aparecem aqui — já pontuados.</div>`; }
function bindLeads(){ document.querySelectorAll('.lead').forEach(el => el.onclick=()=>openLead(+el.dataset.i)); }

function openLead(i){
  const l = DATA.leads[i];
  const respostas = Object.values(l.respostas||{});
  const msg = encodeURIComponent(`Oi ${(l.nome||'').split(' ')[0]}! Sou da ${DATA.tenant.nome}. Vi seu contato pelo formulário — posso te ajudar?`);
  const zapNum = (l.contato||'').replace(/\D/g,'');
  const STATUSES = ['novo','contatado','fechado','perdido'];
  const corTemp = tcss(l.temperatura)==='q' ? 'var(--quente)' : tcss(l.temperatura)==='m' ? 'var(--morno)' : 'var(--frio)';
  dbody.innerHTML = `
    <div class="d-head">
      <div class="av" style="background:${color(l.nome)}">${ini(l.nome)}</div>
      <div><h3>${esc(l.nome)}</h3><div class="meta">${esc(l.contato||'')}${l.origem?' · '+esc(l.origem):''}</div></div>
    </div>
    <div class="scorebar">
      <div class="topl"><b>Pontuação</b><span class="big" style="color:${corTemp}">${l.score??'–'}/100 · ${esc(l.temperatura||'')}</span></div>
    </div>
    <div class="qa">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--dm)">Respostas no formulário</div>
      ${respostas.length
        ? respostas.map(r=>`<div class="row"><span>${esc(r.label)}</span><span class="a">+${r.pontos}</span></div>`).join('')
        : '<div class="row"><span style="color:var(--dr)">Sem perguntas neste funil</span></div>'}
    </div>
    <div class="stbtns">${STATUSES.map(s=>`<button class="${l.status===s?'on':''}" data-s="${s}">${s}</button>`).join('')}</div>
    <a class="zap" href="https://wa.me/${zapNum}?text=${msg}" target="_blank" rel="noopener">💬 Responder no WhatsApp</a>`;
  dbody.querySelectorAll('.stbtns button').forEach(b => b.onclick=()=>setStatus(l,b.dataset.s));
  scrim.classList.add('on'); drawer.classList.add('on');
}

async function setStatus(l, status){
  l.status = status;
  dbody.querySelectorAll('.stbtns button').forEach(b => b.classList.toggle('on', b.dataset.s===status));
  if(!DEMO){
    fetch(`${LEADS_API}?t=${encodeURIComponent(SLUG)}&k=${encodeURIComponent(TOKEN)}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ lead_id: l.id, status })
    }).catch(()=>{});
  }
}

function renderForm(){
  const link = SLUG
    ? `${location.origin}/capta.html?t=${SLUG}`
    : `${location.origin}/capta.html?t=SEU-SLUG`;
  view.innerHTML = `<div class="reveal">

function timeAgo(iso){
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return 'agora';
  if(s<3600) return `há ${Math.floor(s/60)} min`;
  if(s<86400) return `há ${Math.floor(s/3600)} h`;
  return `há ${Math.floor(s/86400)} d`;
}
function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
