<style>
:root{
  --bg:#060A1F; --surface:#0D1430; --surface2:#141C42;
  --tx:#EAF0FF; --dm:rgba(234,240,255,.65); --dr:rgba(234,240,255,.36);
  --or:#2E5BFF; --or-deep:#1E3FD0; --or-soft:rgba(46,91,255,.18);
  --line:rgba(234,240,255,.12);
  --verde:#3BC97A; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;line-height:1.45;min-height:100dvh}
.wrap{max-width:440px;margin:0 auto;padding:22px 20px 40px;min-height:100dvh;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.brand img{width:34px;height:34px;border-radius:9px}
.brand .nm{font-size:17px;font-weight:700;color:var(--tx)}
.brand .nm b{color:var(--or)}
.eb{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--or);margin-bottom:6px}
h1{font-size:clamp(22px,6vw,28px);font-weight:800;letter-spacing:-.02em;line-height:1.12;margin-bottom:8px;color:var(--tx)}
.sub{color:var(--dm);font-size:15px;margin-bottom:22px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px}
label.f{display:block;margin-bottom:14px}
label.f span{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--dm)}
input{width:100%;font-family:inherit;font-size:16px;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface2);color:var(--tx);transition:.16s}
input::placeholder{color:var(--dr)}
input:focus{outline:none;border-color:var(--or);background:var(--surface);box-shadow:0 0 0 4px var(--or-soft)}
.bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:16px}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--or),var(--or-deep));transition:width .3s ease}
.step{font-size:12px;font-weight:700;color:var(--dr);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.q{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:16px;line-height:1.2;color:var(--tx)}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:9px;cursor:pointer;font-family:inherit;font-size:15px;color:var(--tx);transition:.12s}
.opt:hover{border-color:rgba(46,91,255,.6);background:var(--surface2)}
.opt.sel{border-color:var(--or);background:var(--or-soft)}
.opt .dot{flex:0 0 19px;height:19px;border:2px solid var(--dr);border-radius:50%;transition:.12s;position:relative}
.opt.sel .dot{border-color:var(--or);background:var(--or)}
.opt.sel .dot::after{content:"";position:absolute;inset:4px;background:#fff;border-radius:50%}
.btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;background:linear-gradient(135deg,var(--or),var(--or-deep));color:#fff;font-size:16px;padding:15px;border-radius:13px;width:100%;margin-top:6px;transition:.16s;box-shadow:0 12px 28px -14px var(--or-deep)}
.btn:hover{transform:translateY(-1px)}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none}
.btn-back{background:none;border:none;color:var(--dr);font-weight:600;font-size:14px;padding:10px;width:auto;margin-top:8px;cursor:pointer;font-family:inherit}
.err{color:#ff8a5c;font-size:13px;font-weight:600;min-height:18px;margin-top:6px}
.foot{text-align:center;font-size:11px;color:var(--dr);margin-top:24px}
.center{margin:auto 0;text-align:center}
.spin{width:46px;height:46px;border:4px solid var(--surface2);border-top-color:var(--or);border-radius:50%;margin:0 auto 18px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.zapwrap{margin:auto 0;text-align:center}
.zapwrap .check{width:64px;height:64px;border-radius:50%;background:var(--verde);margin:0 auto 18px;display:grid;place-items:center;box-shadow:0 0 28px rgba(59,201,122,.35)}
.zap{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--verde);color:#fff;border:0;font-family:inherit;font-weight:700;font-size:16px;padding:15px 24px;border-radius:13px;text-decoration:none;margin-top:8px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
/* ===================== CONFIG (preencher no deploy) ===================== */
const SUPABASE_URL  = 'https://wpoeigoledhzyvomudgf.supabase.co';
const SUPABASE_ANON = 'sb_publishable_S4eWNjOtaiXTo5sr9Hek0A_42NzE4jf';
const NOTIFY_API    = '/api/capta-notify';
/* ======================================================================= */
const sb     = createClient(SUPABASE_URL, SUPABASE_ANON);
const app    = document.getElementById('app');
const params = new URLSearchParams(location.search);
const SLUG   = params.get('t');
const ORIGEM = params.get('o') || null;
const state  = { tenant:null, perguntas:[], nome:'', contato:'', ans:{}, idx:0 };

init();

async function init(){
  if(!SLUG){ return fatal('Link sem identificação do negócio.'); }
  loading('Carregando…');
  const { data:t } = await sb.from('capta_tenants')
    .select('id,nome,whatsapp,msg_template,cor,headline').eq('slug',SLUG).single();
  if(!t){ return fatal('Negócio não encontrado ou inativo.'); }
  const { data:qs } = await sb.from('capta_perguntas')
    .select('id,texto,opcoes').eq('tenant_id',t.id).eq('ativo',true).order('ordem');
  state.tenant = t; state.perguntas = qs || [];
  if(t.cor) document.documentElement.style.setProperty('--or', t.cor);
  screenStart();
}

function screenStart(){
  app.innerHTML = `
    <p class="eb">${esc(state.tenant.nome)}</p>
    <h1>${esc(state.tenant.headline)}</h1>
    <p class="sub">Responda rapidinho e a gente já te chama no WhatsApp.</p>
    <div class="card">
      <label class="f"><span>Seu nome</span><input id="i-nome" autocomplete="name" placeholder="Como te chamam"></label>
      <label class="f" style="margin-bottom:4px"><span>Seu WhatsApp</span><input id="i-tel" inputmode="tel" autocomplete="tel" placeholder="(92) 9 ____-____"></label>
    </div>
    <div class="err" id="err"></div>
    <button class="btn" id="go">Começar →</button>
    <p class="foot">⚡ por Capta</p>`;
  document.getElementById('go').onclick = () => {
    const nome = v('i-nome'), tel = v('i-tel');
    if(nome.length < 2) return setErr('Digite seu nome.');
    if(tel.replace(/\D/g,'').length < 10) return setErr('Digite um WhatsApp válido com DDD.');
    state.nome = nome; state.contato = tel; state.idx = 0;
    state.perguntas.length ? screenQ() : finish();
  };
}

function screenQ(){
  const q     = state.perguntas[state.idx];
  const total = state.perguntas.length;
  const pct   = Math.round(state.idx / total * 100);
  app.innerHTML = `
    <div class="bar"><i style="width:${pct}%"></i></div>
    <p class="step">Pergunta ${state.idx+1} de ${total}</p>
    <p class="q">${esc(q.texto)}</p>
    <div>${q.opcoes.map((o,i) => `<button class="opt" data-i="${i}"><span class="dot"></span><span>${esc(o.label)}</span></button>`).join('')}</div>
    ${state.idx > 0 ? '<button class="btn-back" id="back">← Voltar</button>' : ''}`;
  document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
    document.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    const o = q.opcoes[+b.dataset.i];
    state.ans[q.id] = { label: o.label, pontos: o.pontos|0 };
    setTimeout(() => {
      if(state.idx < total - 1){ state.idx++; screenQ(); } else finish();
    }, 280);
  });
  const back = document.getElementById('back');
  if(back) back.onclick = () => { state.idx--; screenQ(); };
}

async function finish(){
  loading('Quase lá…');
  let leadId = null;
  try{
    const { data, error } = await sb.from('capta_leads').insert({
      tenant_id: state.tenant.id,
      nome: state.nome,
      contato: state.contato,
      respostas: state.ans,
      origem: ORIGEM
    }).select('id').single();
    if(error) throw error;
    leadId = data.id;
    fetch(NOTIFY_API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ lead_id: leadId }) }).catch(() => {});
  } catch(e){ console.warn('insert falhou:', e?.message); }
  const msg = state.tenant.msg_template.replace(/\{nome\}/g, state.nome);
  const url = `https://wa.me/${state.tenant.whatsapp}?text=${encodeURIComponent(msg)}`;
  screenDone(url);
  setTimeout(() => { location.href = url; }, 1200);
}

function screenDone(url){
  app.innerHTML = `
    <div class="zapwrap">
      <div class="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h1 style="font-size:23px">Tudo certo, ${esc(state.nome.split(' ')[0])}!</h1>
      <p class="sub" style="margin:8px auto 0;max-width:30ch">Estamos te levando pro WhatsApp. Se não abrir, toca abaixo.</p>
      <a class="zap" href="${url}">💬 Abrir o WhatsApp</a>
    </div>`;
}

function loading(txt){ app.innerHTML = `<div class="center"><div class="spin"></div><p class="sub" style="margin:0">${txt}</p></div>`; }
function fatal(txt){ app.innerHTML = `<div class="center"><p class="q">Ops.</p><p class="sub">${txt}</p></div>`; }
function v(id){ return document.getElementById(id).value.trim(); }
function setErr(t){ document.getElementById('err').textContent = t; }
function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
